<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Toggle</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="checkbox.css">
</head>
<body>
    <div class="center">
        <label class="toggle-label">
            <input type="checkbox" id="backgroundToggle">
            <div class="toggle-icons">
                <span class="icon-moon">🌙</span>
                <span class="icon-sun">☀️</span>
            </div>
            <span class="toggle-track">
                <span class="toggle-knob"></span>
            </span>
            <span class="toggle-text" data-dark="Dark Mode" data-light="Light Mode">Dark Mode</span>
        </label>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const checkbox = document.getElementById('backgroundToggle');
            
            checkbox.addEventListener('change', function() {
                if (checkbox.checked) {
                    document.body.classList.add('bg-changed');
                } else {
                    document.body.classList.remove('bg-changed');
                }
            });
        });
        
    </script>
</body>
</html>
